<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Emotion Link</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0a0f;color:#e0e0e0;display:flex;align-items:center;justify-content:center;min-height:100vh}
.container{text-align:center;padding:2rem}
.face{font-size:4rem;margin-bottom:1rem;color:#bb86fc;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.spinner{width:32px;height:32px;margin:1.5rem auto;border:3px solid rgba(187,134,252,.15);border-top-color:#bb86fc;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
h1{margin-bottom:.5rem;font-size:1.25rem;font-weight:500}
p{color:#888;font-size:.875rem;line-height:1.5}
.fallback{margin-top:2rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,.08)}
.fallback a{color:#bb86fc;text-decoration:none;font-size:.8125rem}
.fallback a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="container">
<div class="face">-_-</div>
<div class="spinner"></div>
<h1>Opening Emotion Link</h1>
<p>Redirecting to your companion...</p>
<div class="fallback">
<a href="#" onclick="return false" id="manual">emotion://connect/<span id="token"></span></a>
</div>
</div>
<script>
var path = window.location.pathname;
var match = path.match(/\/connect\/(.+)/);
if (match) {
  document.getElementById('token').textContent = match[1];
  document.getElementById('manual').href = 'emotion://connect/' + match[1];
  document.getElementById('manual').onclick = null;
  window.location.href = 'emotion://connect/' + match[1];
}
</script>
</body>
</html>
