<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Emotion Link</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0a0f;color:#e0e0e0;display:flex;align-items:center;justify-content:center;min-height:100vh}
.container{text-align:center;padding:2rem}
.face{font-size:4rem;margin-bottom:1rem;color:#bb86fc;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.spinner{width:32px;height:32px;margin:1.5rem auto;border:3px solid rgba(187,134,252,.15);border-top-color:#bb86fc;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
h1{margin-bottom:.5rem;font-size:1.25rem;font-weight:500}
p{color:#888;font-size:.875rem;line-height:1.5}
.btn{margin-top:1.5rem;display:inline-block;padding:.75rem 2rem;border:1px solid rgba(187,134,252,.3);border-radius:12px;color:#bb86fc;text-decoration:none;font-size:.875rem;transition:background .2s}
.btn:hover{background:rgba(187,134,252,.1)}
</style>
</head>
<body>
<div class="container">
<div class="face">-_-</div>
<div class="spinner"></div>
<h1>Opening Emotion Link</h1>
<p>Tap the button if it doesn't open automatically</p>
<a class="btn" href="#" id="openBtn">Open Emotion Link</a>
</div>
<script>
var path = window.location.pathname;
var match = path.match(/\/connect\/(.+)/);
if (match) {
  var uri = 'emotion://connect/' + encodeURIComponent(match[1]);
  var btn = document.getElementById('openBtn');
  btn.href = uri;
  btn.onclick = null;
  // iframe method for better compatibility
  var iframe = document.createElement('iframe');
  iframe.src = uri;
  iframe.style.display = 'none';
  document.body.appendChild(iframe);
  // location redirect fallback
  window.location.href = uri;
  // meta refresh backup
  var meta = document.createElement('meta');
  meta.httpEquiv = 'refresh';
  meta.content = '0; url=' + uri;
  document.head.appendChild(meta);
}
</script>
</body>
</html>
