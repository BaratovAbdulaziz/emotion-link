<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Emotion Link</title></head>
<body>
<script>
var path = window.location.pathname;
var match = path.match(/\/connect\/(.+)/);
if (match) {
  var uri = 'emotion://connect/' + encodeURIComponent(match[1]);
  var iframe = document.createElement('iframe');
  iframe.src = uri;
  iframe.style.display = 'none';
  document.body.appendChild(iframe);
  window.location.href = uri;
}
</script>
</body>
</html>
